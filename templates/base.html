<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Django Practical Exam</title>
    <style>
        :root {
            --bg: #f7f4ef;
            --card: #ffffff;
            --text: #2d2a26;
            --accent: #2a6f9a;
            --accent-soft: #e6f2f8;
            --muted: #6c6a67;
            --border: #e4dfd8;
            --danger: #b3412c;
            --success: #2e7d5b;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Georgia", "Times New Roman", serif;
            background: linear-gradient(180deg, #f7f4ef 0%, #f0ebe4 100%);
            color: var(--text);
        }
        header {
            background: #1f3b4d;
            color: #fefcf8;
            padding: 20px 0;
        }
        .container {
            width: min(1100px, 92%);
            margin: 0 auto;
        }
        .nav {
            display: flex;
            gap: 18px;
            align-items: center;
        }
        .nav a {
            color: #fefcf8;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .hero {
            margin: 24px 0 10px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(31, 59, 77, 0.08);
        }
        .grid {
            display: grid;
            gap: 18px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            font-size: 15px;
        }
        th, td {
            border-bottom: 1px solid var(--border);
            padding: 10px 8px;
            text-align: left;
        }
        th {
            color: var(--muted);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.6px;
        }
        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            border-radius: 999px;
            padding: 8px 14px;
            font-weight: 600;
            cursor: pointer;
            background: var(--accent);
            color: #ffffff;
        }
        .btn.secondary {
            background: var(--accent-soft);
            color: var(--accent);
            border: 1px solid var(--accent);
        }
        .messages {
            margin: 12px 0;
            display: grid;
            gap: 8px;
        }
        .message {
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #fff;
        }
        .message.success { border-color: rgba(46, 125, 91, 0.35); color: var(--success); }
        .message.error { border-color: rgba(179, 65, 44, 0.35); color: var(--danger); white-space: pre-line; }
        .highlight { background: #fff6d6; }
        .pagination {
            margin-top: 14px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .pagination a {
            text-decoration: none;
            color: var(--accent);
        }
        form.inline {
            display: inline;
        }
        .form-row {
            display: grid;
            gap: 12px;
        }
        label { font-weight: 600; font-size: 14px; }
        input, select {
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        .two-col {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 14px;
        }
    </style>
</head>
<body>
<header>
    <div class="container nav">
        <div style="font-size: 20px; font-weight: 700;">Product Workflow</div>
        <a href="{% url 'products:draft_upload' %}">Drafts & Upload</a>
        <a href="{% url 'products:approved_products' %}">Approved Products</a>
    </div>
</header>
<main class="container">
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
